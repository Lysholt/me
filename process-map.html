<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Development Process Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── Toolbar ── */
  #toolbar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    align-items: center;
    background: rgba(30, 32, 44, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 10px 16px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #toolbar h1 {
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-right: 8px;
    white-space: nowrap;
  }

  .sep { width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 4px; }

  .tool-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 13px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    background: transparent;
    color: #94a3b8;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }
  .tool-btn.active { background: #4f46e5; color: #fff; box-shadow: 0 0 0 1px rgba(79,70,229,0.5); }
  .tool-btn svg { flex-shrink: 0; }

  #add-btn {
    background: #4f46e5;
    color: #fff;
    box-shadow: 0 2px 8px rgba(79,70,229,0.4);
  }
  #add-btn:hover { background: #4338ca; }

  /* ── Canvas ── */
  #canvas {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  #canvas.mode-connect { cursor: crosshair; }
  #canvas.mode-delete  { cursor: not-allowed; }

  #svg-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* Edges */
  .edge {
    stroke: #4f46e5;
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    opacity: 0.7;
    pointer-events: stroke;
    cursor: pointer;
    transition: stroke 0.15s, opacity 0.15s;
  }
  .edge:hover, .edge.hovered { stroke: #f43f5e; opacity: 1; stroke-width: 3; }

  .edge-arrow { fill: #4f46e5; opacity: 0.7; }

  /* Temp edge while connecting */
  #temp-edge { stroke: #a78bfa; stroke-width: 2; stroke-dasharray: 6 4; fill: none; pointer-events: none; }

  /* ── Nodes ── */
  #nodes-layer { position: absolute; inset: 0; z-index: 2; }

  .node {
    position: absolute;
    min-width: 160px;
    max-width: 220px;
    border-radius: 12px;
    padding: 14px 16px;
    cursor: grab;
    transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
    border: 2px solid transparent;
  }
  .node:active { cursor: grabbing; }
  .node.selected {
    border-color: #a78bfa !important;
    box-shadow: 0 0 0 3px rgba(167,139,250,0.25), 0 16px 40px rgba(0,0,0,0.5) !important;
  }
  .node.connecting-source { border-color: #4ade80 !important; box-shadow: 0 0 0 3px rgba(74,222,128,0.25) !important; }
  .node.connect-hover { border-color: #facc15 !important; box-shadow: 0 0 0 3px rgba(250,204,21,0.25) !important; }

  .node-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.7;
  }
  .node-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .node-desc {
    font-size: 11px;
    opacity: 0.6;
    line-height: 1.4;
  }
  .node-delete {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    color: #f43f5e;
    transition: opacity 0.15s;
    background: none; border: none;
    padding: 2px 4px;
  }
  .node:hover .node-delete { opacity: 0.6; }
  .node-delete:hover { opacity: 1 !important; }

  /* Node colour themes */
  .node-discovery  { background: linear-gradient(135deg,#1e1b4b,#2d2069); border-color: #3730a3; color: #c4b5fd; }
  .node-research   { background: linear-gradient(135deg,#0c2340,#0e3460); border-color: #1e40af; color: #93c5fd; }
  .node-ideation   { background: linear-gradient(135deg,#1a2e1a,#1e3a1e); border-color: #166534; color: #86efac; }
  .node-design     { background: linear-gradient(135deg,#2d1b00,#3d2600); border-color: #92400e; color: #fcd34d; }
  .node-build      { background: linear-gradient(135deg,#2d0f1e,#3d1028); border-color: #9f1239; color: #fda4af; }
  .node-validate   { background: linear-gradient(135deg,#1a1a2e,#16213e); border-color: #7c3aed; color: #d8b4fe; }
  .node-launch     { background: linear-gradient(135deg,#0f2020,#0f2d2d); border-color: #0f766e; color: #5eead4; }
  .node-default    { background: linear-gradient(135deg,#1e2030,#252840); border-color: #374151; color: #d1d5db; }

  /* ── Modal ── */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: #1e2030;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 28px;
    width: 360px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  #modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    background: #0f1117;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #4f46e5; }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-group select option { background: #1e2030; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary { flex: 1; padding: 10px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-primary:hover { background: #4338ca; }
  .btn-secondary { padding: 10px 16px; background: rgba(255,255,255,0.06); color: #94a3b8; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; font-size: 14px; cursor: pointer; transition: background 0.15s; }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); }

  /* ── Help hint ── */
  #hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30,32,44,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 12px;
    color: #64748b;
    z-index: 50;
    white-space: nowrap;
  }
  #hint span { color: #a78bfa; }

  /* ── Mini-map ── */
  #minimap {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 160px;
    height: 100px;
    background: rgba(15,17,23,0.8);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    overflow: hidden;
    z-index: 50;
  }
  #minimap-svg { width: 100%; height: 100%; }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <h1>Process Map</h1>
  <div class="sep"></div>
  <button class="tool-btn active" id="mode-select" title="Select & drag nodes">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M4 0l16 12-7 2-4 8z"/></svg>
    Select
  </button>
  <button class="tool-btn" id="mode-connect" title="Click two nodes to connect them">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="5" cy="12" r="3"/><circle cx="19" cy="12" r="3"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Connect
  </button>
  <button class="tool-btn" id="mode-delete" title="Click node or edge to delete">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    Delete
  </button>
  <div class="sep"></div>
  <button class="tool-btn" id="add-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Node
  </button>
</div>

<!-- Canvas -->
<div id="canvas">
  <svg id="svg-layer">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" class="edge-arrow"/>
      </marker>
      <marker id="arrow-hover" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#f43f5e" opacity="1"/>
      </marker>
    </defs>
    <path id="temp-edge" d="" style="display:none"/>
  </svg>
  <div id="nodes-layer"></div>
</div>

<!-- Add Node Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Add Node</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="node-title" placeholder="e.g. User Research" />
    </div>
    <div class="form-group">
      <label>Description (optional)</label>
      <textarea id="node-desc" placeholder="Brief description…"></textarea>
    </div>
    <div class="form-group">
      <label>Phase</label>
      <select id="node-type">
        <option value="discovery">Discovery</option>
        <option value="research">Research</option>
        <option value="ideation">Ideation</option>
        <option value="design">Design</option>
        <option value="build">Build</option>
        <option value="validate">Validate</option>
        <option value="launch">Launch</option>
        <option value="default">Other</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-confirm">Add Node</button>
    </div>
  </div>
</div>

<!-- Hint bar -->
<div id="hint">
  <span>Drag</span> to move · <span>Connect</span> mode to link nodes · <span>Double-click</span> canvas to add · hover edge to delete
</div>

<!-- Mini-map -->
<div id="minimap">
  <svg id="minimap-svg"></svg>
</div>

<script>
const CANVAS_W = window.innerWidth;
const CANVAS_H = window.innerHeight;

/* ── State ── */
let nodes = [];
let edges = [];
let mode = 'select'; // select | connect | delete
let connecting = null; // id of source node while connecting
let nodeIdCounter = 0;
let edgeIdCounter = 0;
let pendingX = 0, pendingY = 0; // where to place next node

/* ── DOM refs ── */
const canvas     = document.getElementById('canvas');
const svgLayer   = document.getElementById('svg-layer');
const nodesLayer = document.getElementById('nodes-layer');
const tempEdge   = document.getElementById('temp-edge');
const modal      = document.getElementById('modal-overlay');
const modeButtons = {
  select:  document.getElementById('mode-select'),
  connect: document.getElementById('mode-connect'),
  delete:  document.getElementById('mode-delete'),
};

/* ── Utilities ── */
function uid(prefix) { return prefix + (++nodeIdCounter); }
function edgeId()    { return 'e' + (++edgeIdCounter); }

function nodeCenter(node) {
  const el = document.getElementById('node-' + node.id);
  if (!el) return { x: node.x, y: node.y };
  return {
    x: node.x + el.offsetWidth  / 2,
    y: node.y + el.offsetHeight / 2,
  };
}

function curvePath(x1, y1, x2, y2) {
  const dx = Math.abs(x2 - x1) * 0.5;
  return `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
}

/* ── Mode switching ── */
function setMode(m) {
  mode = m;
  canvas.className = m !== 'select' ? `mode-${m}` : '';
  Object.entries(modeButtons).forEach(([k,btn]) => {
    btn.classList.toggle('active', k === m);
  });
  // cancel any in-progress connection
  if (connecting) {
    document.getElementById('node-' + connecting)?.classList.remove('connecting-source');
    connecting = null;
    tempEdge.style.display = 'none';
  }
  clearNodeSelection();
}

Object.entries(modeButtons).forEach(([k,btn]) => btn.addEventListener('click', () => setMode(k)));

/* ── Node creation ── */
function createNode(id, x, y, title, desc, type) {
  const node = { id, x, y, title, desc, type: type || 'default' };
  nodes.push(node);
  renderNode(node);
  renderEdges();
  updateMinimap();
  return node;
}

function renderNode(node) {
  let el = document.getElementById('node-' + node.id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'node-' + node.id;
    el.className = `node node-${node.type}`;
    nodesLayer.appendChild(el);
    attachNodeEvents(el, node);
  } else {
    el.className = `node node-${node.type}`;
  }
  const phaseLabels = {
    discovery:'Discovery', research:'Research', ideation:'Ideation',
    design:'Design', build:'Build', validate:'Validate', launch:'Launch', default:'Step'
  };
  el.innerHTML = `
    <button class="node-delete" data-id="${node.id}" title="Delete node">✕</button>
    <div class="node-tag">${phaseLabels[node.type] || 'Step'}</div>
    <div class="node-title">${node.title}</div>
    ${node.desc ? `<div class="node-desc">${node.desc}</div>` : ''}
  `;
  el.style.left = node.x + 'px';
  el.style.top  = node.y + 'px';
  // re-attach delete button
  el.querySelector('.node-delete').addEventListener('click', e => {
    e.stopPropagation();
    if (mode === 'select') deleteNode(node.id);
  });
}

function attachNodeEvents(el, node) {
  /* Drag */
  let dragging = false, ox = 0, oy = 0, startX = 0, startY = 0;

  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (mode === 'delete') { deleteNode(node.id); return; }
    if (mode === 'connect') {
      handleConnectClick(node.id);
      return;
    }
    // select mode – start drag
    startX = e.clientX; startY = e.clientY;
    ox = e.clientX - node.x;
    oy = e.clientY - node.y;
    dragging = false;

    const onMove = ev => {
      if (!dragging && (Math.abs(ev.clientX-startX)+Math.abs(ev.clientY-startY)) > 4) dragging = true;
      if (!dragging) return;
      node.x = Math.max(0, ev.clientX - ox);
      node.y = Math.max(60, ev.clientY - oy);
      el.style.left = node.x + 'px';
      el.style.top  = node.y + 'px';
      renderEdges();
      updateMinimap();
    };
    const onUp = ev => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      if (!dragging) selectNode(node.id);
      el.style.cursor = 'grab';
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    e.stopPropagation();
  });

  /* Connect hover */
  el.addEventListener('mouseenter', () => {
    if (mode === 'connect' && connecting && connecting !== node.id) {
      el.classList.add('connect-hover');
    }
  });
  el.addEventListener('mouseleave', () => el.classList.remove('connect-hover'));
}

/* ── Selection ── */
let selectedNode = null;
function selectNode(id) {
  clearNodeSelection();
  selectedNode = id;
  document.getElementById('node-' + id)?.classList.add('selected');
}
function clearNodeSelection() {
  if (selectedNode) {
    document.getElementById('node-' + selectedNode)?.classList.remove('selected');
    selectedNode = null;
  }
}
canvas.addEventListener('mousedown', e => {
  if (e.target === canvas || e.target === svgLayer || e.target === nodesLayer) {
    clearNodeSelection();
    if (connecting) {
      document.getElementById('node-' + connecting)?.classList.remove('connecting-source');
      connecting = null;
      tempEdge.style.display = 'none';
    }
  }
});

/* ── Connecting ── */
function handleConnectClick(id) {
  if (!connecting) {
    connecting = id;
    document.getElementById('node-' + id).classList.add('connecting-source');
    return;
  }
  if (connecting === id) {
    // deselect
    document.getElementById('node-' + id).classList.remove('connecting-source');
    connecting = null;
    tempEdge.style.display = 'none';
    return;
  }
  // create edge if not duplicate
  const exists = edges.some(e =>
    (e.from === connecting && e.to === id) || (e.from === id && e.to === connecting)
  );
  if (!exists) {
    edges.push({ id: edgeId(), from: connecting, to: id });
    renderEdges();
    updateMinimap();
  }
  document.getElementById('node-' + connecting)?.classList.remove('connecting-source');
  document.getElementById('node-' + id)?.classList.remove('connect-hover');
  connecting = null;
  tempEdge.style.display = 'none';
}

// Animated temp edge while connecting
canvas.addEventListener('mousemove', e => {
  if (mode !== 'connect' || !connecting) return;
  const src = nodes.find(n => n.id === connecting);
  if (!src) return;
  const c = nodeCenter(src);
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  tempEdge.setAttribute('d', curvePath(c.x, c.y, mx, my));
  tempEdge.style.display = '';
});

/* ── Delete ── */
function deleteNode(id) {
  nodes = nodes.filter(n => n.id !== id);
  edges = edges.filter(e => e.from !== id && e.to !== id);
  document.getElementById('node-' + id)?.remove();
  renderEdges();
  updateMinimap();
  if (selectedNode === id) selectedNode = null;
}

function deleteEdge(id) {
  edges = edges.filter(e => e.id !== id);
  renderEdges();
  updateMinimap();
}

/* ── Render edges ── */
function renderEdges() {
  // remove old paths
  svgLayer.querySelectorAll('.edge').forEach(p => p.remove());

  edges.forEach(edge => {
    const from = nodes.find(n => n.id === edge.from);
    const to   = nodes.find(n => n.id === edge.to);
    if (!from || !to) return;
    const c1 = nodeCenter(from);
    const c2 = nodeCenter(to);
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','edge');
    path.setAttribute('d', curvePath(c1.x, c1.y, c2.x, c2.y));
    path.setAttribute('marker-end','url(#arrow)');
    path.addEventListener('mouseenter', () => path.classList.add('hovered'));
    path.addEventListener('mouseleave', () => path.classList.remove('hovered'));
    path.addEventListener('click', () => { if (mode === 'delete') deleteEdge(edge.id); });
    svgLayer.insertBefore(path, tempEdge);
  });
}

/* ── Minimap ── */
function updateMinimap() {
  const mm = document.getElementById('minimap-svg');
  mm.innerHTML = '';
  if (!nodes.length) return;
  const pad = 10;
  const allX = nodes.map(n => n.x); const allY = nodes.map(n => n.y);
  const minX = Math.min(...allX), maxX = Math.max(...allX) + 200;
  const minY = Math.min(...allY), maxY = Math.max(...allY) + 80;
  const scaleX = (160 - pad*2) / (maxX - minX || 1);
  const scaleY = (100 - pad*2) / (maxY - minY || 1);
  const scale  = Math.min(scaleX, scaleY);
  const tx = n => pad + (n - minX) * scale;
  const ty = n => pad + (n - minY) * scale;

  edges.forEach(edge => {
    const f = nodes.find(n=>n.id===edge.from), t=nodes.find(n=>n.id===edge.to);
    if (!f||!t) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', tx(f.x+100)); line.setAttribute('y1', ty(f.y+40));
    line.setAttribute('x2', tx(t.x+100)); line.setAttribute('y2', ty(t.y+40));
    line.setAttribute('stroke','#4f46e5'); line.setAttribute('stroke-width','1.5'); line.setAttribute('opacity','0.6');
    mm.appendChild(line);
  });
  nodes.forEach(node => {
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    const colors = { discovery:'#7c3aed',research:'#1d4ed8',ideation:'#15803d',design:'#b45309',build:'#be123c',validate:'#6d28d9',launch:'#0f766e',default:'#374151' };
    rect.setAttribute('x', tx(node.x)); rect.setAttribute('y', ty(node.y));
    rect.setAttribute('width', Math.max(8, 100*scale)); rect.setAttribute('height', Math.max(5, 40*scale));
    rect.setAttribute('rx','2'); rect.setAttribute('fill', colors[node.type]||'#374151'); rect.setAttribute('opacity','0.85');
    mm.appendChild(rect);
  });
}

/* ── Modal ── */
document.getElementById('add-btn').addEventListener('click', () => {
  pendingX = Math.random() * (CANVAS_W - 300) + 100;
  pendingY = Math.random() * (CANVAS_H - 200) + 100;
  openModal();
});

// Double-click canvas to add node
canvas.addEventListener('dblclick', e => {
  if (e.target !== canvas && e.target !== nodesLayer && e.target !== svgLayer) return;
  const rect = canvas.getBoundingClientRect();
  pendingX = e.clientX - rect.left - 90;
  pendingY = e.clientY - rect.top  - 40;
  openModal();
});

function openModal() {
  document.getElementById('node-title').value = '';
  document.getElementById('node-desc').value  = '';
  document.getElementById('node-type').value  = 'default';
  modal.classList.add('open');
  setTimeout(() => document.getElementById('node-title').focus(), 50);
}

document.getElementById('modal-cancel').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

document.getElementById('modal-confirm').addEventListener('click', confirmAdd);
document.getElementById('modal').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); confirmAdd(); } });

function confirmAdd() {
  const title = document.getElementById('node-title').value.trim();
  if (!title) { document.getElementById('node-title').focus(); return; }
  const desc  = document.getElementById('node-desc').value.trim();
  const type  = document.getElementById('node-type').value;
  const id    = uid('n');
  createNode(id, pendingX, pendingY, title, desc, type);
  modal.classList.remove('open');
}

/* ── Keyboard shortcuts ── */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 's' || e.key === 'Escape') setMode('select');
  if (e.key === 'c') setMode('connect');
  if (e.key === 'd') setMode('delete');
  if (e.key === 'a') {
    pendingX = Math.random()*(CANVAS_W-300)+100;
    pendingY = Math.random()*(CANVAS_H-200)+100;
    openModal();
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNode && mode === 'select') {
    deleteNode(selectedNode);
  }
});
