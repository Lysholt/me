<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dansk Lønseddel-beregner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #e8e8e8;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 40px 20px;
  }

  h1 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: #1a1a1a;
  }

  .subtitle {
    text-align: center;
    color: #666;
    font-size: 0.85rem;
    margin-bottom: 32px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Input cards ── */
  .card {
    background: #fff;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    padding: 20px 24px;
  }

  .card h2 {
    font-size: 0.72rem;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    margin-bottom: 14px;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  @media (max-width: 520px) {
    .grid-2 { grid-template-columns: 1fr; }
  }

  .field { margin-bottom: 0; }

  label {
    display: block;
    font-size: 0.78rem;
    color: #555;
    margin-bottom: 4px;
  }

  input[type="number"] {
    width: 100%;
    background: #fafafa;
    border: 1px solid #ccc;
    border-radius: 5px;
    color: #1a1a1a;
    font-size: 0.9rem;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: #555; background: #fff; }
  input::placeholder { color: #aaa; }

  button {
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 12px 32px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    width: 100%;
    letter-spacing: 0.02em;
  }

  button:hover { background: #333; }

  /* ── Payslip output ── */
  .result-card {
    background: #fff;
    border: 1px solid #b0b0b0;
    border-radius: 4px;
    padding: 28px 32px;
    display: none;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.82rem;
    color: #000;
  }

  .result-card.visible { display: block; }

  /* Period header */
  .slip-period {
    font-size: 0.85rem;
    font-weight: bold;
    margin-bottom: 14px;
    letter-spacing: 0.01em;
  }

  /* Main line-items table */
  .slip-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 0;
  }

  .slip-table thead tr {
    border-bottom: 1px solid #000;
  }

  .slip-table thead th {
    font-family: 'Courier New', Courier, monospace;
    font-weight: normal;
    font-size: 0.82rem;
    padding: 2px 6px 5px;
    text-align: right;
    white-space: nowrap;
  }

  .slip-table thead th:first-child { text-align: left; padding-left: 0; }
  .slip-table thead th:last-child  { padding-right: 0; }

  .slip-table tbody tr { border: none; }

  .slip-table td {
    padding: 2px 6px;
    text-align: right;
    white-space: nowrap;
    vertical-align: top;
  }

  .slip-table td.spec {
    text-align: left;
    padding-left: 0;
    white-space: normal;
    min-width: 220px;
  }

  .slip-table td.spec .kode {
    display: inline-block;
    width: 3.8em;
    color: #000;
  }

  .slip-table td:last-child { padding-right: 0; }

  /* Separator after last line item */
  .slip-table tbody tr.sep-after td {
    border-bottom: 1px solid #000;
    padding-bottom: 6px;
  }

  /* Transfer section — simple monospace lines */
  .transfer-section {
    padding-top: 8px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.82rem;
  }

  .transfer-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }

  .transfer-row.net-pay {
    border-top: 1px solid #000;
    border-bottom: 2px solid #000;
    margin-top: 4px;
    padding: 4px 0;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>Dansk Lønseddel-beregner</h1>
<p class="subtitle">Beregn din nettoløn — dækker alle linjer på lønsedlen</p>

<div class="container">

  <div class="card">
    <h2>Indkomst</h2>
    <div class="grid-2">
      <div class="field">
        <label>1000 Månedsløn (kr./md.)</label>
        <input type="number" id="maanedsloenn" placeholder="" min="0" step="100" autofocus>
      </div>
      <div class="field">
        <label>1562 Erhvervskort (kr./md.)</label>
        <input type="number" id="erhvervskort" placeholder="543.04" min="0" step="0.01" value="543.04">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Pension</h2>
    <div class="grid-2">
      <div class="field">
        <label>6200 Arbejdsgiverbidrag (%)</label>
        <input type="number" id="empxPension" placeholder="9" min="0" max="100" step="0.5" value="9">
      </div>
      <div class="field">
        <label>6201/6205 Medarbejderbidrag (%)</label>
        <input type="number" id="empPension" placeholder="7" min="0" max="100" step="0.5" value="7">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Skattekort</h2>
    <div class="grid-2">
      <div class="field">
        <label>Trækprocent (%)</label>
        <input type="number" id="traekpct" placeholder="42" min="0" max="100" step="0.5" value="42">
      </div>
      <div class="field">
        <label>Månedsfradrag (kr.)</label>
        <input type="number" id="maanedsfradrag" placeholder="5964" min="0" step="1" value="5964">
      </div>
    </div>
  </div>

  <button onclick="calculate()">Beregn lønseddel</button>

  <!-- ── Payslip output ── -->
  <div class="result-card" id="resultCard">

    <div class="slip-period" id="slipPeriod"></div>

    <table class="slip-table">
      <thead>
        <tr>
          <th style="text-align:left">Specifikation</th>
          <th>Grundlag</th>
          <th>Enheder</th>
          <th>Sats</th>
          <th>Beløb</th>
        </tr>
      </thead>
      <tbody id="slipLines"></tbody>
    </table>

    <div class="transfer-section" id="transferSection"></div>

  </div>

</div>

<script>
  const TAX = {
    amBidrag:      0.08,
    atpEmployee:   99,
    atpFirm:       198,
    stBededagRate: 0.0045,
    friTelefon:    291.67,
    pensionSelskab: 'Danica',
    normtid:       160.33,
  };

  function fmt(v) {
    if (v === null || v === undefined || v === '') return '';
    return Math.abs(v).toLocaleString('da-DK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtSats(v) {
    if (v === null || v === undefined || v === '') return '';
    return v.toLocaleString('da-DK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // negative amounts shown as "1.234,56-" (suffix), matching real payslip format
  function line(kode, spec, grundlag, enheder, sats, beloeb, isNeg, extraClass) {
    const gTd = grundlag !== '' ? `<td>${fmt(grundlag)}</td>`  : '<td></td>';
    const eTd = enheder  !== '' ? `<td>${fmt(enheder)}</td>`   : '<td></td>';
    const sTd = sats     !== '' ? `<td>${fmtSats(sats)}</td>`  : '<td></td>';
    let bTd = '<td></td>';
    if (beloeb !== '') {
      const val = isNeg ? `${fmt(beloeb)}-` : fmt(beloeb);
      bTd = `<td>${val}</td>`;
    }
    const cls = extraClass ? ` class="${extraClass}"` : '';
    return `<tr${cls}>
      <td class="spec"><span class="kode">${kode}</span>${spec}</td>
      ${gTd}${eTd}${sTd}${bTd}
    </tr>`;
  }

  function calculate() {
    const maaned         = parseFloat(document.getElementById('maanedsloenn').value)    || 0;
    const erh            = parseFloat(document.getElementById('erhvervskort').value)    || 0;
    const rateX          = (parseFloat(document.getElementById('empxPension').value)    || 0) / 100;
    const rateEmp        = (parseFloat(document.getElementById('empPension').value)     || 0) / 100;
    const traekpct       = parseFloat(document.getElementById('traekpct').value)        || 0;
    const maanedsfradrag = parseFloat(document.getElementById('maanedsfradrag').value)  || 0;

    if (maaned <= 0) { alert('Angiv venligst en månedsløn.'); return; }

    const pensionBase      = maaned - erh;
    const empPensionTotal  = pensionBase * rateEmp;
    const empxPensionMonth = pensionBase * rateX;

    const stBededagBase = pensionBase * (1 + rateX);
    const stBededag     = stBededagBase * TAX.stBededagRate;

    const amGrundlag = pensionBase + TAX.friTelefon + stBededag - empPensionTotal - TAX.atpEmployee;
    const amBidrag   = Math.round(amGrundlag * TAX.amBidrag);
    const aIndkomst  = amGrundlag - amBidrag;
    const aSkat      = Math.floor(Math.max(0, aIndkomst - maanedsfradrag) * traekpct / 100);
    const net        = maaned - erh + stBededag - amBidrag - aSkat - TAX.atpEmployee - empPensionTotal;

    document.getElementById('slipPeriod').textContent = 'Lønseddel';

    let html = '';
    html += line('1000', 'Månedsløn',                        '',              '',             '',                         maaned,           false);
    if (erh > 0)
      html += line('1562', 'Erhvervskort',                   '',              '',             '',                         erh,              true);
    html += line('3050', 'Fri telefon',                      TAX.friTelefon,  '',             '',                         '',               false);
    html += line('6200',      TAX.pensionSelskab,            empxPensionMonth, pensionBase,   rateX * 100,                '',               false);
    html += line('6201/6205', 'Medarbejderbidrag pension',   '',              pensionBase,    rateEmp * 100,              empPensionTotal,   true);
    html += line('7500', 'St. Bededagskomp.',                stBededag,       stBededagBase,  TAX.stBededagRate * 100,    '',               false);
    html += line('7523', 'St. Bededagskomp. Udbt. løb.',     '',              '',             '',                         stBededag,        false);
    html += line('8100', 'ATP A-sats',                       '',              TAX.normtid,    '',                         TAX.atpEmployee,  true);
    html += line('8170', 'ATP firmabidrag',                  TAX.atpFirm,     '',             '',                         '',               false);
    html += line('8220', 'AM-bidrag af løn',                 '',              amGrundlag,     TAX.amBidrag * 100,         amBidrag,         true);
    html += line('8250', 'A-skat af løn',                    aIndkomst,       maanedsfradrag, traekpct,                   aSkat,            true, 'sep-after');

    document.getElementById('slipLines').innerHTML = html;

    const pensionTotal = empxPensionMonth + empPensionTotal;
    let tHtml = '';
    if (pensionTotal > 0) {
      tHtml += `<div class="transfer-row">
        <span>Overført til ${TAX.pensionSelskab}</span>
        <span>${fmt(pensionTotal)}</span>
      </div>`;
    }
    tHtml += `<div class="transfer-row net-pay">
      <span>Udbetalt til konto</span>
      <span>${fmt(net)}</span>
    </div>`;
    document.getElementById('transferSection').innerHTML = tHtml;

    document.getElementById('resultCard').classList.add('visible');
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
</script>

</body>
</html>
