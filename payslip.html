<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dansk Lønseddel-beregner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 40px 20px;
  }

  h1 {
    text-align: center;
    font-size: 1.8rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: #f8fafc;
  }

  .subtitle {
    text-align: center;
    color: #94a3b8;
    font-size: 0.9rem;
    margin-bottom: 40px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: rgba(30, 32, 44, 0.92);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 28px;
  }

  .card h2 {
    font-size: 0.85rem;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 20px;
  }

  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  @media (max-width: 600px) {
    .grid-3 { grid-template-columns: 1fr; }
  }

  .field { margin-bottom: 0; }

  label {
    display: block;
    font-size: 0.82rem;
    color: #94a3b8;
    margin-bottom: 5px;
  }

  input[type="number"] {
    width: 100%;
    background: rgba(15,17,23,0.8);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: #f1f5f9;
    font-size: 0.95rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #6366f1; }
  input::placeholder { color: #475569; }

  button {
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 32px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    width: 100%;
  }

  button:hover { background: #4f46e5; }

  /* ── Payslip output ── */
  .result-card {
    background: rgba(30, 32, 44, 0.92);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 32px;
    display: none;
  }

  .result-card.visible { display: block; }

  .slip-period {
    font-size: 1rem;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .slip-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
    margin-bottom: 24px;
  }

  .slip-table thead th {
    color: #475569;
    font-weight: 500;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 8px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    text-align: right;
  }

  .slip-table thead th:first-child { text-align: left; }

  .slip-table tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .slip-table tbody tr:last-child { border-bottom: none; }

  .slip-table td {
    padding: 7px 8px;
    text-align: right;
    color: #94a3b8;
    white-space: nowrap;
  }

  .slip-table td.spec {
    text-align: left;
    color: #cbd5e1;
    white-space: normal;
  }

  .slip-table td.spec .kode {
    color: #475569;
    font-size: 0.8rem;
    margin-right: 8px;
  }

  .slip-table td.beloeb-pos { color: #34d399; }
  .slip-table td.beloeb-neg { color: #f87171; }
  .slip-table td.beloeb-neu { color: #e2e8f0; }

  .transfer-section {
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 16px;
    margin-bottom: 24px;
  }

  .transfer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 0.9rem;
  }

  .transfer-row .t-label { color: #94a3b8; }
  .transfer-row .t-amount { color: #e2e8f0; font-variant-numeric: tabular-nums; }

  .transfer-row.net-pay {
    background: rgba(99, 102, 241, 0.12);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 10px;
    padding: 12px 16px;
    margin-top: 8px;
  }

  .transfer-row.net-pay .t-label { color: #f1f5f9; font-weight: 600; font-size: 0.95rem; }
  .transfer-row.net-pay .t-amount { color: #34d399; font-weight: 700; font-size: 1.1rem; }

  .summary-section {
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 20px;
  }

  .summary-section h3 {
    font-size: 0.78rem;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    font-size: 0.84rem;
  }

  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
  }

  .summary-col { padding-right: 24px; }

  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 12px;
  }

  .summary-row:last-child { border-bottom: none; }
  .summary-row .s-label { color: #94a3b8; }
  .summary-row .s-value { color: #e2e8f0; font-variant-numeric: tabular-nums; white-space: nowrap; }
</style>
</head>
<body>

<h1>Dansk Lønseddel-beregner</h1>
<p class="subtitle">Beregn din nettoløn — dækker alle linjer på lønsedlen</p>

<div class="container">

  <div class="card">
    <h2>Lønoplysninger</h2>
    <div class="grid-3">
      <div class="field">
        <label>Bruttoløn (kr./md.)</label>
        <input type="number" id="maanedsloenn" placeholder="87880" min="0" step="100" autofocus>
      </div>
      <div class="field">
        <label>6200 Arbejdsgiverbidrag (%)</label>
        <input type="number" id="empxPension" placeholder="9" min="0" max="100" step="0.5" value="9">
      </div>
      <div class="field">
        <label>6201/6205 Medarbejderbidrag (%)</label>
        <input type="number" id="empPension" placeholder="7" min="0" max="100" step="0.5" value="7">
      </div>
    </div>
  </div>

  <button onclick="calculate()">Beregn lønseddel</button>

  <div class="result-card" id="resultCard">
    <div class="slip-period" id="slipPeriod"></div>

    <table class="slip-table">
      <thead>
        <tr>
          <th style="text-align:left">Specifikation</th>
          <th>Grundlag</th>
          <th>Enheder</th>
          <th>Sats</th>
          <th>Beløb</th>
        </tr>
      </thead>
      <tbody id="slipLines"></tbody>
    </table>

    <div class="transfer-section" id="transferSection"></div>

    <div class="summary-section">
      <h3>Årsopgørelse (akkumuleret)</h3>
      <div class="summary-grid" id="summaryGrid"></div>
    </div>
  </div>

</div>

<script>
  // 2026 Danish tax parameters
  const TAX = {
    amBidrag:               0.08,
    personfradrag:          4300,
    bundskat:               0.1201,
    topskatRate:            0.15,
    topskatThresholdAnnual: 611500,
    atpEmployee:            99,      // 37-timer full rate
    atpFirm:                198,
    stBededagRate:          0.0045,
    friTelefon:             291.67,
    muniRate:               0.251,   // landsgennemsnit
    pensionSelskab:         'Danica',
    normtid:                160.33,
  };

  function fmt(v) {
    if (v === null || v === undefined || v === '') return '';
    return Math.abs(v).toLocaleString('da-DK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtSats(v) {
    if (v === null || v === undefined || v === '') return '';
    return v.toLocaleString('da-DK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function line(kode, spec, grundlag, enheder, sats, beloeb, beloebClass) {
    const gTd = grundlag !== '' ? `<td>${fmt(grundlag)}</td>`  : '<td></td>';
    const eTd = enheder  !== '' ? `<td>${fmt(enheder)}</td>`   : '<td></td>';
    const sTd = sats     !== '' ? `<td>${fmtSats(sats)}</td>`  : '<td></td>';
    let bTd = '<td></td>';
    if (beloeb !== '') {
      const cls  = beloebClass || 'beloeb-neu';
      const sign = beloebClass === 'beloeb-neg' ? '−' : '';
      bTd = `<td class="${cls}">${sign}${fmt(beloeb)}</td>`;
    }
    return `<tr>
      <td class="spec"><span class="kode">${kode}</span>${spec}</td>
      ${gTd}${eTd}${sTd}${bTd}
    </tr>`;
  }

  function sumRow(label, value) {
    return `<div class="summary-row">
      <span class="s-label">${label}</span>
      <span class="s-value">${fmt(value)}</span>
    </div>`;
  }

  function calculate() {
    const maaned  = parseFloat(document.getElementById('maanedsloenn').value) || 0;
    const rateX   = (parseFloat(document.getElementById('empxPension').value) || 0) / 100;
    const rateEmp = (parseFloat(document.getElementById('empPension').value)  || 0) / 100;

    if (maaned <= 0) { alert('Angiv venligst en bruttoløn.'); return; }

    // Pension (grundlag = bruttoløn)
    const pensionBase      = maaned;
    const empPensionTotal  = pensionBase * rateEmp;
    const empxPensionMonth = pensionBase * rateX;

    // Store Bededag (auto, 0,45 % af løn)
    const stBededag = maaned * TAX.stBededagRate;

    // AM-bidrag
    const amGrundlag = maaned + TAX.friTelefon;
    const amBidrag   = amGrundlag * TAX.amBidrag;

    // A-indkomst
    const aIndkomst = amGrundlag - amBidrag;

    // A-skat
    const taxableBase = Math.max(0, aIndkomst - TAX.personfradrag - empPensionTotal);
    const bundskat    = taxableBase * TAX.bundskat;
    const kommuneskat = taxableBase * TAX.muniRate;
    const annualBasis = aIndkomst * 12;
    const topTaxBase  = Math.max(0, annualBasis - TAX.topskatThresholdAnnual);
    const topskat     = (topTaxBase / 12) * TAX.topskatRate;
    const aSkat       = bundskat + kommuneskat + topskat;
    const traekpct    = aIndkomst > 0 ? (aSkat / aIndkomst) * 100 : 0;

    // Net pay
    const net = maaned + stBededag - amBidrag - aSkat - TAX.atpEmployee - empPensionTotal;

    // Period header
    document.getElementById('slipPeriod').textContent = 'Lønseddel';

    // Line items
    let html = '';
    html += line('1000', 'Månedsløn',                         '',           '',             '',                          maaned,            'beloeb-pos');
    html += line('3050', 'Fri telefon',                       TAX.friTelefon, '',           '',                          '',                '');
    html += line('6200',     TAX.pensionSelskab,              empxPensionMonth, pensionBase, rateX * 100,   '',              '');
    html += line('6201/6205', 'Medarbejderbidrag pension',    '',              pensionBase, rateEmp * 100, empPensionTotal, 'beloeb-neg');
    html += line('7500', 'St. Bededagskomp.',                 stBededag,    amGrundlag,     TAX.stBededagRate * 100,     '',                '');
    html += line('7523', 'St. Bededagskomp. Udbt. løb.',      '',           '',             '',                          stBededag,         'beloeb-pos');
    html += line('8100', 'ATP A-sats',                        '',           TAX.normtid,    '',                          TAX.atpEmployee,   'beloeb-neg');
    html += line('8170', 'ATP firmabidrag',                   TAX.atpFirm,  '',             '',                          '',                '');
    html += line('8220', 'AM-bidrag af løn',                  '',           amGrundlag,     TAX.amBidrag * 100,          amBidrag,          'beloeb-neg');
    html += line('8250', 'A-skat af løn',                     '',           aIndkomst,      parseFloat(traekpct.toFixed(2)), aSkat,         'beloeb-neg');

    document.getElementById('slipLines').innerHTML = html;

    // Transfer section
    const pensionTotal = empxPensionMonth + empPensionTotal;
    let tHtml = '';
    if (pensionTotal > 0) {
      tHtml += `<div class="transfer-row">
        <span class="t-label">Overført til ${TAX.pensionSelskab}</span>
        <span class="t-amount">${fmt(pensionTotal)}</span>
      </div>`;
    }
    tHtml += `<div class="transfer-row net-pay">
      <span class="t-label">Udbetalt til konto</span>
      <span class="t-amount">${fmt(net)}</span>
    </div>`;
    document.getElementById('transferSection').innerHTML = tHtml;

    // Summary
    const col1 = [
      ['AM-grundlag', amGrundlag],
      ['AM-bidrag',   amBidrag],
      ['A-indkomst',  aIndkomst],
      ['A-skat',      aSkat],
      ['ATP eget',    TAX.atpEmployee],
      ['ATP firma',   TAX.atpFirm],
      ['Fri tlf.',    TAX.friTelefon],
    ];
    const col2 = [
      ['Pension firma', empxPensionMonth],
      ['Pension egen',  empPensionTotal],
    ];

    document.getElementById('summaryGrid').innerHTML = `
      <div class="summary-col">${col1.map(([l,v]) => sumRow(l,v)).join('')}</div>
      <div class="summary-col">${col2.map(([l,v]) => sumRow(l,v)).join('')}</div>
      <div class="summary-col"></div>
    `;

    document.getElementById('resultCard').classList.add('visible');
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
</script>

</body>
</html>
